<div class="product-container">
  <h1>📦 Products</h1>
  
  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="loading" class="loading">Loading products...</div>

  <div class="form-section">
    <h2>Add New Product</h2>
    <div class="form-group">
      <input 
        [(ngModel)]="form.name" 
        placeholder="Product Name" 
        class="form-input"
        [disabled]="loading"
      >
      <input 
        [(ngModel)]="form.price" 
        type="number" 
        placeholder="Price" 
        class="form-input"
        [disabled]="loading"
      >
      <input 
        [(ngModel)]="form.description" 
        placeholder="Description" 
        class="form-input"
        [disabled]="loading"
      >
      <button (click)="save()" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Adding...' : '➕ Add Product' }}
      </button>
    </div>
  </div>

  <div class="products-section">
    <h2>Available Products</h2>
    <div *ngIf="products.length === 0" class="no-products">
      <p>No products available. Create one to get started!</p>
    </div>
    <div class="products-grid">
      <div *ngFor="let product of products" class="product-card">
        <h3>{{ product.name }}</h3>
        <p class="price">${{ product.price }}</p>
        <p class="description">{{ product.description || 'No description' }}</p>
        <button (click)="delete(product._id)" class="btn-danger">🗑️ Delete</button>
      </div>
    </div>
  </div>
</div>
